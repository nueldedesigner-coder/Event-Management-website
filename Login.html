<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — Ayo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="logo">Ayo<span class="logo-dot">.</span></a>
  </div>
</header>

<main class="auth-wrap">
  <section class="auth-panel" aria-hidden="true">
    <div class="auth-panel-copy">
      <span class="eyebrow eyebrow-light">Welcome back</span>
      <h1>Your next campus<br>moment is waiting.</h1>
      <p>Log in to grab tickets, track your bookings, and get notified when your favorite organizers drop new events.</p>
    </div>
    <div class="auth-decor">
      <div class="mini-stub"></div>
      <div class="mini-stub mini-stub-2"></div>
    </div>
  </section>

  <section class="auth-card-wrap">
    <div class="auth-card">
      <h2>Log in</h2>
      <p class="auth-sub">New to Ayo? <a href="signup.html">Create an account</a></p>

      <button type="button" class="btn-google" id="googleLoginBtn">
        <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
          <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84c-.21 1.13-.84 2.09-1.79 2.73v2.27h2.9c1.7-1.57 2.69-3.88 2.69-6.64z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.17l-2.9-2.27c-.8.54-1.83.86-3.06.86-2.35 0-4.34-1.59-5.05-3.72H.96v2.34C2.44 15.98 5.48 18 9 18z"/>
          <path fill="#FBBC05" d="M3.95 10.7A5.4 5.4 0 0 1 3.68 9c0-.59.1-1.17.27-1.7V4.96H.96A9 9 0 0 0 0 9c0 1.45.35 2.83.96 4.04l2.99-2.34z"/>
          <path fill="#EA4335" d="M9 3.58c1.32 0 2.51.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0 5.48 0 2.44 2.02.96 4.96l2.99 2.34C4.66 5.17 6.65 3.58 9 3.58z"/>
        </svg>
        Continue with Google
      </button>

      <div class="divider"><span>or log in with email</span></div>

      <form id="loginForm" novalidate>
        <div class="form-field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@campus.edu" required>
        </div>
        <div class="form-field">
          <div class="field-row">
            <label for="password">Password</label>
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>
          <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Log in</button>
      </form>
    </div>
  </section>
</main>

<script src="js/script.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
